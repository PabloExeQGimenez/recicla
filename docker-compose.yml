services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: recicla
      POSTGRES_USER: recicla_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recicla_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recicla_admin -d recicla"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    command: ["sh", "-c", "cd apps/api && npx prisma migrate deploy && node dist/prisma/seed.js && node dist/src/main"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://recicla_admin:${POSTGRES_PASSWORD:-recicla_secret}@postgres:5432/recicla
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@recicla.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
